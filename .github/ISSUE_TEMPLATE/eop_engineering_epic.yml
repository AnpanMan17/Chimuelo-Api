name: "⚙️ EOP Engineering Task"
description: "Standard engineering task for EOP product work — US stories, epics, implementation, and integration items (M1–M4)."
title: "[EPIC EX]->[US-XXX]->[ACX]"
labels: ["epic"]
assignees: []
body:

  # ─────────────────────────────────────────────────────────────────────
  # BINDING NOTICE
  # ─────────────────────────────────────────────────────────────────────
  - type: markdown
    attributes:
      value: |
        > **⚠️ Binding Contract Notice**
        > Adding this issue to the EOP board implies it is part of the **product scope**, will be **evaluated under engineering criteria**, and must comply with all standards defined in the SWAgreement.
        > Issues with missing mandatory fields are **INCOMPLETE** and excluded from evaluation.
        >
        > Workflow: `Triage → Backlog → In Progress → Pending Review → In Review → On Hold → Pending Final Review → In Final Review → Done`

  # ─────────────────────────────────────────────────────────────────────
  # SECTION 1 — METADATA
  # ─────────────────────────────────────────────────────────────────────
  - type: markdown
    attributes:
      value: "## 📌 Issue Metadata"

  - type: dropdown
    id: team
    attributes:
      label: "Team ✅"
      description: "Squad responsible for this issue. No shared ownership — one squad owns it end-to-end."
      options:
        - Catalyst
        - Hyperion
        - Nexus
        - Orion
    validations:
      required: true

  - type: dropdown
    id: milestone
    attributes:
      label: "Milestone ✅"
      description: "Product milestone this issue belongs to. Milestones represent capability evolution, not academic phases."
      options:
        - "M1 — Core Communication Layer"
        - "M2 — Processing Capability"
        - "M3 — Product API & Integration"
        - "M4 — Edge & IoT Integration"
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: "Priority ✅"
      description: "Impact level on product progression."
      options:
        - "Urgent — Must be resolved immediately"
        - "High — Direct impact on project progression"
        - "Medium — Important, does not block progress"
        - "Low — Minor or non-urgent improvement"
    validations:
      required: true

  - type: dropdown
    id: size
    attributes:
      label: "Size ✅"
      description: "Effort estimation."
      options:
        - "XS — < 1 day"
        - "S — 1–2 days"
        - "M — 3–5 days"
        - "L — 6–10 days"
        - "XL — > 10 days"
    validations:
      required: true

  - type: input
    id: estimated_days
    attributes:
      label: "Estimated Days ✅"
      description: "Numeric estimate in working days."
      placeholder: "e.g. 3"
    validations:
      required: true

  - type: input
    id: target_date
    attributes:
      label: "Target Date ✅"
      description: "Expected completion date."
      placeholder: "YYYY-MM-DD"
    validations:
      required: true

  - type: input
    id: branch
    attributes:
      label: "Branch Name"
      description: "Branch must follow naming schema or it will be rejected without review."
      placeholder: "feature/<issue-number_short-description>  or  fix/<issue-number_short-description>"
    validations:
      required: false

  - type: textarea
    id: notes
    attributes:
      label: "Notes"
      description: "Optional context, external dependencies, risk flags, or relevant links."
      placeholder: "e.g. Depends on ADR-003 being finalized. Blocking US-104."
    validations:
      required: false

  # ─────────────────────────────────────────────────────────────────────
  # SECTION 2 — TRACEABILITY
  # ─────────────────────────────────────────────────────────────────────
  - type: markdown
    attributes:
      value: |
        ---
        ## 🏷️ Traceability
        > Every feature must trace to a documented requirement. Every architectural decision must have a corresponding ADR.

  - type: input
    id: requirement_id
    attributes:
      label: "Requirement ID"
      description: "US or NFR identifier from PRD-EOP-2077-001."
      placeholder: "e.g. US-101  /  NFR-1  /  US-203"
    validations:
      required: false

  - type: input
    id: adr_reference
    attributes:
      label: "ADR Reference"
      description: "ADR(s) that govern this work. Stored in /docs/adr/."
      placeholder: "e.g. ADR-001, ADR-003"
    validations:
      required: false

  - type: input
    id: epic
    attributes:
      label: "Epic"
      description: "Parent epic this issue belongs to."
      placeholder: "e.g. E1 — C++ TCP Server  /  E5 — Parallel HPC Engine"
    validations:
      required: false

  # ─────────────────────────────────────────────────────────────────────
  # SECTION 3 — USER STORY
  # ─────────────────────────────────────────────────────────────────────
  - type: markdown
    attributes:
      value: |
        ---
        ## 📖 User Story

  - type: dropdown
    id: persona
    attributes:
      label: "Persona"
      description: "Who is the primary beneficiary of this work?"
      options:
        - "Vault Operator — operations engineer, manages bunkers from terminal"
        - "Network Analyst — processes large-scale network topologies"
        - "Integration Engineer — connects external services to EOP via API"
        - "Edge Device — ESP32 / ZephyrOS in remote bunkers"
        - "Internal — no external persona (infrastructure, tooling, observability)"
    validations:
      required: true

  - type: textarea
    id: user_story
    attributes:
      label: "Story"
      description: "Complete the user story narrative."
      placeholder: |
        As a <persona>,
        I want to <action / capability>,
        So that <business value / outcome>.
    validations:
      required: true

  # ─────────────────────────────────────────────────────────────────────
  # SECTION 4 — DESIGN ARTIFACTS
  # ─────────────────────────────────────────────────────────────────────
  - type: markdown
    attributes:
      value: |
        ---
        ## 🏗️ Design Artifacts
        > **Design precedes implementation.** No code is written before the design is documented.
        > Complete this section before moving the issue to `In Progress`.

  - type: dropdown
    id: adr_required
    attributes:
      label: "ADR Required?"
      description: "Does this issue introduce or modify an architectural decision?"
      options:
        - "Yes — ADR created and linked in Traceability above"
        - "No — Covered by existing ADR (referenced above)"
        - "No — Implementation task, no new architectural decision"
    validations:
      required: true

  - type: textarea
    id: design_notes
    attributes:
      label: "Design Notes / Diagrams"
      description: "Describe the design approach. Include sequence diagrams, component boundaries, interface contracts, concurrency model, or error-handling strategy as applicable. Link to /docs/design/ if diagrams are committed there."
      placeholder: |
        Component: eop-server
        Interface: TCP socket, port EOP_PORT
        Concurrency: thread-per-connection (see ADR-002)
        Error handling: returns EOP_ERR_DISCONNECTED on peer close — no crash, no UB
        OTel spans: one span per REGISTER, QUERY_NODE, LIST_NODES, connection, disconnection
        Log fields: timestamp, level, trace_id, span_id, node_id, event, message
    validations:
      required: false

  - type: checkboxes
    id: design_checklist
    attributes:
      label: "Design Checklist (complete before moving to In Progress)"
      options:
        - label: "Component boundaries and responsibilities defined"
          required: false
        - label: "Interface / API contract specified (message types, function signatures, or REST endpoints)"
          required: false
        - label: "Sequence diagram or interaction diagram created and committed to /docs/design/ (if applicable)"
          required: false
        - label: "Concurrency model documented (if applicable)"
          required: false
        - label: "Error-handling strategy defined (error codes, failure modes, no exceptions across module boundaries)"
          required: false
        - label: "Observability design included: OTel span names, structured log fields, Prometheus metrics exposed"
          required: false

  # ─────────────────────────────────────────────────────────────────────
  # SECTION 5 — TECHNICAL SCOPE
  # ─────────────────────────────────────────────────────────────────────
  - type: markdown
    attributes:
      value: |
        ---
        ## ⚙️ Technical Scope

  - type: textarea
    id: scope_in
    attributes:
      label: "What this issue DOES"
      description: "One paragraph. Specific about the deliverable. What will exist after this issue is Done that did not exist before?"
      placeholder: "Implements the TCP server accept loop and welcome handshake. Delivers a binary that listens on EOP_PORT, accepts connections, sends a welcome message with server version / timestamp / session ID, and handles clean disconnection."
    validations:
      required: true

  - type: textarea
    id: dependencies
    attributes:
      label: "Dependencies"
      description: "Which squads, services, ADRs, or issues does this depend on? What behavior is assumed from them?"
      placeholder: |
        - ADR-003 (Protocol v1.0) must be Accepted before implementation begins.
        - Depends on ADR-002 (Concurrency Model) being finalized by this squad.
        - Squad Hyperion's client library (US-105) is a consumer — no direct dependency here.
    validations:
      required: false

  # ─────────────────────────────────────────────────────────────────────
  # SECTION 6 — TESTING REQUIREMENTS
  # ─────────────────────────────────────────────────────────────────────
  - type: markdown
    attributes:
      value: |
        ---
        ## 🧪 Testing Requirements
        > Minimum coverage: **90%** on business logic. Trivial / superficial tests are **prohibited**.
        > CI must pass on all commits before merge.

  - type: textarea
    id: test_plan
    attributes:
      label: "Test Plan"
      description: "Describe unit, integration, and load/concurrency tests. Include specific cases, edge cases, and error paths."
      placeholder: |
        Unit tests:
          - successful connect → welcome message received within 500 ms
          - server unavailable → client receives clean error (no crash, no hang)
          - idle timeout expiry → connection closed gracefully

        Integration tests:
          - full connect → handshake → disconnect cycle × 100 iterations, zero errors
          - 10 concurrent clients, zero timeouts

        Load tests:
          - 100 concurrent clients, P99 latency ≤ 2× single-client baseline (NFR-1)
    validations:
      required: true

  - type: checkboxes
    id: test_checklist
    attributes:
      label: "Test Checklist"
      options:
        - label: "Unit tests cover: normal flow, edge cases, and all error paths"
          required: false
        - label: "Integration tests cover: end-to-end flow and cross-squad interoperability (if applicable)"
          required: false
        - label: "Load / concurrency test covers NFR-1 thresholds (if applicable)"
          required: false
        - label: "AddressSanitizer / Valgrind: zero memory leaks, zero uninitialized memory"
          required: false
        - label: "ThreadSanitizer: zero data races (mandatory if concurrent code is introduced)"
          required: false
        - label: "clang-tidy: zero warnings, zero errors"
          required: false
        - label: "cppcheck / scan-build: zero findings"
          required: false
        - label: "SonarQube: zero findings"
          required: false

  # ─────────────────────────────────────────────────────────────────────
  # SECTION 7 — DELIVERABLES & DOD
  # ─────────────────────────────────────────────────────────────────────
  - type: markdown
    attributes:
      value: |
        ---
        ## 📦 Deliverables Checklist
        > A task may only be closed when **all** items below are satisfied.

  - type: checkboxes
    id: checklist_code
    attributes:
      label: "Code Quality"
      options:
        - label: "`clang-format` compliance verified — CI passes"
          required: false
        - label: "`clang-tidy` — zero warnings, zero errors"
          required: false
        - label: "`cppcheck` / `scan-build` — zero findings"
          required: false
        - label: "`valgrind` / ASan / TSan — zero memory leaks, zero data races, zero uninitialized memory"
          required: false
        - label: "No magic numbers — all literals defined as named constants"
          required: false
        - label: "No global variables"
          required: false
        - label: "No hardcoded credentials or configuration values"
          required: false
        - label: "All inputs validated and sanitized (user / file / network)"
          required: false
        - label: "RAII applied to all resources (sockets, file descriptors, memory, mutexes)"
          required: false
        - label: "C++ exceptions do not cross module boundaries — public interfaces use error codes or `std::expected`"
          required: false

  - type: checkboxes
    id: checklist_docs
    attributes:
      label: "Documentation"
      options:
        - label: "All public `.hpp` files include Doxygen headers (`@file`, `@brief`, `@details`, `@param`, `@return`, `@pre`, `@post`)"
          required: false
        - label: "`.cpp` files include inline comments only — no Doxygen blocks"
          required: false
        - label: "`README.md` updated: how to build, run locally, execute test suite"
          required: false
        - label: "`CHANGELOG.md` entry added for this change"
          required: false
        - label: "ADR created or updated (if applicable) — stored in `/docs/adr/` and linked from `README.md`"
          required: false

  - type: checkboxes
    id: checklist_ci
    attributes:
      label: "CI / CD & Deployment"
      options:
        - label: "CI pipeline is fully green (build + test + lint + sanitizers)"
          required: false
        - label: "Docker image builds successfully — runtime image ≤ 50 MB"
          required: false
        - label: "K8s manifests pass `kubeval` / `kubeconform` validation (if applicable)"
          required: false
        - label: "At least **one peer review approved** (reviewer ≠ author)"
          required: false

  - type: checkboxes
    id: checklist_git
    attributes:
      label: "Git Hygiene"
      options:
        - label: "All commits are GPG-signed"
          required: false
        - label: "Each commit represents one logical change — no bulk commits"
          required: false
        - label: "Commit messages follow Conventional Commits"
          required: false
        - label: "Branch name follows schema: `feature/<issue-number_description>` or `fix/<issue-number_description>`"
          required: false
        - label: "No compiled binaries, libraries (`.so`, `.dll`), log files, or generated files committed"
          required: false
        - label: "Target branch is `release/<version>` — direct commits to `main` are PROHIBITED"
          required: false

  - type: checkboxes
    id: definition_of_done
    attributes:
      label: "✅ Definition of Done"
      description: "This issue is Done ONLY when every item below is checked."
      options:
        - label: "Code is merged to release branch with CI fully green"
          required: false
        - label: "Every acceptance criterion is verifiable with an automated test or a reproducible demo"
          required: false
        - label: "If an architectural decision was made, the corresponding ADR is documented in `/docs/adr/`"
          required: false
        - label: "No memory leaks or data races introduced — verified by CI sanitizers"
          required: false
        - label: "`README.md` reflects the current state: build, run locally, test suite"
          required: false
        - label: "`CHANGELOG.md` updated with a meaningful entry"
          required: false

  # ─────────────────────────────────────────────────────────────────────
  # IN-PROGRESS UPDATES REMINDER
  # ─────────────────────────────────────────────────────────────────────
  - type: markdown
    attributes:
      value: |
        ---
        ## 📢 In-Progress Updates
        > While this issue is `In Progress`, post a progress update **at minimum each session** directly in this thread using the format below.
        > ```
        > # Update — YYYY-MM-DD
        > - Work completed today:
        > - Blockers encountered:
        > - Next steps:
        > ```

  - type: checkboxes
    id: submission_checklist
    attributes:
      label: "Submission Checklist"
      description: "Confirm before opening this issue."
      options:
        - label: "I searched for existing issues and confirmed this is not a duplicate."
          required: true
        - label: "All mandatory fields (Team, Milestone, Priority, Size, Estimated Days, Target Date) are filled."
          required: true
        - label: "The user story follows the As a / I want / So that format."
          required: true
        - label: "Acceptance criteria are measurable and testable — not vague."
          required: true
        - label: "Technical scope (DOES / DOES NOT) is explicitly defined."
          required: true
