name: "🚀 EOP Engineering Task"
description: "Standard engineering task for EOP product work — US stories, epics, implementation, and integration items (M1–M4)."
title: "[EPIC EX] Lorem ipsum"
labels: ["epic"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        > **⚠️ Binding Contract Notice**
        > Adding this issue to the EOP board implies it is part of the **product scope**, will be **evaluated under engineering criteria**, and must comply with all standards defined in the SWAgreement.
        > Issues with missing mandatory fields are **INCOMPLETE** and excluded from evaluation.
        >
        > Workflow: `Triage → Backlog → In Progress → Pending Review → In Review → On Hold → Pending Final Review → In Final Review → Done`

  - type: markdown
    attributes:
      value: "## 📌 Issue Metadata"

  - type: dropdown
    id: team
    attributes:
      label: "Team ✅"
      description: "Squad responsible for this issue. No shared ownership — one squad owns it end-to-end."
      options:
        - Catalyst
        - Hyperion
        - Nexus
        - Orion
    validations:
      required: true

  - type: dropdown
    id: milestone
    attributes:
      label: "Milestone ✅"
      description: "Product milestone this issue belongs to. Milestones represent capability evolution, not academic phases."
      options:
        - "M1 — Core Communication Layer"
        - "M2 — Processing Capability"
        - "M3 — Product API & Integration"
        - "M4 — Edge & IoT Integration"
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: "Priority ✅"
      description: "Impact level on product progression."
      options:
        - "Urgent — Must be resolved immediately"
        - "High — Direct impact on project progression"
        - "Medium — Important, does not block progress"
        - "Low — Minor or non-urgent improvement"
    validations:
      required: true

  - type: dropdown
    id: size
    attributes:
      label: "Size ✅"
      description: "Effort estimation."
      options:
        - "XS — < 1 day"
        - "S — 1–2 days"
        - "M — 3–5 days"
        - "L — 6–10 days"
        - "XL — > 10 days"
    validations:
      required: true

  - type: input
    id: estimated_days
    attributes:
      label: "Estimated Days ✅"
      description: "Numeric estimate in working days."
      placeholder: "e.g. 3"
    validations:
      required: true
      pattern: "^[0-9]+([.][0-9]+)?$"

  - type: input
    id: target_date
    attributes:
      label: "Target Date ✅"
      description: "Expected completion date."
      placeholder: "YYYY-MM-DD"
    validations:
      required: true
      pattern: "^[0-9]{4}-[0-9]{2}-[0-9]{2}$"

  - type: input
    id: branch
    attributes:
      label: "Branch Name"
      description: "Branch must follow naming schema or it will be rejected without review."
      placeholder: "feature/<issue-number_short-description>  or  fix/<issue-number_short-description>"
    validations:
      required: false

  - type: textarea
    id: notes
    attributes:
      label: "Notes"
      description: "Optional context, external dependencies, risk flags, or relevant links."
      placeholder: "e.g. Depends on ADR-003 being finalized. Blocking US-104."
    validations:
      required: false

  - type: markdown
    attributes:
      value: |
        ---
        ## 🏷️ Traceability
        > Every feature must trace to a documented requirement. Every architectural decision must have a corresponding ADR.

  - type: input
    id: requirement_id
    attributes:
      label: "Requirement ID"
      description: "US or NFR identifier from PRD-EOP-2077-001."
      placeholder: "e.g. US-101  /  NFR-1  /  US-203"
    validations:
      required: false

  - type: input
    id: adr_reference
    attributes:
      label: "ADR Reference"
      description: "ADR(s) that govern this work. Stored in /docs/adr/."
      placeholder: "e.g. ADR-001, ADR-003"
    validations:
      required: false

  - type: input
    id: epic
    attributes:
      label: "Epic"
      description: "Parent epic this issue belongs to."
      placeholder: "e.g. E1 — C++ TCP Server  /  E5 — Parallel HPC Engine"
    validations:
      required: false

  - type: markdown
    attributes:
      value: |
        ---
        ## 📖 User Story

  - type: dropdown
    id: persona
    attributes:
      label: "Persona"
      description: "Who is the primary beneficiary of this work?"
      options:
        - "Vault Operator — operations engineer, manages bunkers from terminal"
        - "Network Analyst — processes large-scale network topologies"
        - "Integration Engineer — connects external services to EOP via API"
        - "Edge Device — ESP32 / ZephyrOS in remote bunkers"
        - "Internal — no external persona (infrastructure, tooling, observability)"
    validations:
      required: true

  - type: textarea
    id: user_story
    attributes:
      label: "Story"
      description: "Complete the user story narrative."
      placeholder: |
        As a <persona>,
        I want to <action / capability>,
        So that <business value / outcome>.
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        ---
        ## 🏗️ Design Artifacts
        > **Design precedes implementation.** No code is written before the design is documented.
        > Complete this section before moving the issue to `In Progress`.

  - type: dropdown
    id: adr_required
    attributes:
      label: "ADR Required?"
      description: "Does this issue introduce or modify an architectural decision?"
      options:
        - "Yes — ADR created and linked in Traceability above"
        - "No — Covered by existing ADR (referenced above)"
        - "No — Implementation task, no new architectural decision"
    validations:
      required: true

  - type: textarea
    id: design_notes
    attributes:
      label: "Design Notes / Diagrams"
      description: "Describe the design approach. Include sequence diagrams, component boundaries, interface contracts, concurrency model, or error-handling strategy as applicable. Link to /docs/design/ if diagrams are committed there."
    validations:
      required: false

  - type: checkboxes
    id: design_checklist
    attributes:
      label: "Design Checklist (complete before moving to In Progress)"
      options:
        - label: "Component boundaries and responsibilities defined"
        - label: "Interface / API contract specified (message types, function signatures, or REST endpoints)"
        - label: "Sequence diagram or interaction diagram created and committed to /docs/design/ (if applicable)"
        - label: "Concurrency model documented (if applicable)"
        - label: "Error-handling strategy defined (error codes, failure modes, no exceptions across module boundaries)"
        - label: "Observability design included: OTel span names, structured log fields, Prometheus metrics exposed"

  - type: markdown
    attributes:
      value: |
        ---
        ## ⚙️ Technical Scope

  - type: textarea
    id: scope_in
    attributes:
      label: "What this issue DOES"
      description: "One paragraph. Specific about the deliverable. What will exist after this issue is Done that did not exist before?"
    validations:
      required: true

  - type: textarea
    id: dependencies
    attributes:
      label: "Dependencies"
      description: "Which squads, services, ADRs, or issues does this depend on? What behavior is assumed from them?"
    validations:
      required: false

  - type: markdown
    attributes:
      value: |
        ---
        ## 🧪 Testing Requirements
        > Minimum coverage: **90%** on business logic. Trivial / superficial tests are **prohibited**.
        > CI must pass on all commits before merge.

  - type: textarea
    id: test_plan
    attributes:
      label: "Test Plan"
      description: "Describe unit, integration, and load/concurrency tests. Include specific cases, edge cases, and error paths."
    validations:
      required: false

  - type: checkboxes
    id: test_checklist
    attributes:
      label: "Test Checklist"
      options:
        - label: "Unit tests cover: normal flow, edge cases, and all error paths"
        - label: "Integration tests cover: end-to-end flow and cross-squad interoperability (if applicable)"
        - label: "Load / concurrency test covers NFR-1 thresholds (if applicable)"
        - label: "AddressSanitizer / Valgrind: zero memory leaks, zero uninitialized memory"
        - label: "ThreadSanitizer: zero data races (mandatory if concurrent code is introduced)"
        - label: "clang-tidy: zero warnings, zero errors"
        - label: "cppcheck / scan-build: zero findings"
        - label: "SonarQube: zero findings"

  - type: markdown
    attributes:
      value: |
        ---
        ## 📦 Deliverables Checklist
        > A task may only be closed when **all** items below are satisfied.

  - type: checkboxes
    id: submission_checklist
    attributes:
      label: "Submission Checklist"
      description: "Confirm before opening this issue."
      options:
        - label: "I searched for existing issues and confirmed this is not a duplicate."
          required: true
        - label: "All mandatory fields (Team, Milestone, Priority, Size, Estimated Days, Target Date) are filled."
          required: true
        - label: "The user story follows the As a / I want / So that format."
          required: true
        - label: "Acceptance criteria are measurable and testable — not vague."
          required: true
        - label: "Technical scope (DOES / DOES NOT) is explicitly defined."
          required: true
